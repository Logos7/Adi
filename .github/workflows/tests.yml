name: tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-tests:
    name: Python tests / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: |
          python -m compileall -q sutra cores/bija/sim tools apps/bija

      - name: Run tests on Linux
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE/sutra:$GITHUB_WORKSPACE/cores/bija"
          python -m pytest cores/bija/tests

      - name: Run tests on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$env:GITHUB_WORKSPACE\sutra;$env:GITHUB_WORKSPACE\cores\bija"
          python -m pytest cores/bija/tests
